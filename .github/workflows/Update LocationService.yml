name: Auto Update LocationService

on:
  schedule:
    # 每24小时运行一次
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-module:
    runs-on: ubuntu-latest
    # 添加以下 env 配置即可消除 Node.js 20 弃用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout repository
      # 官方 checkout action v4 之后通常会发布新版以原生支持 Node 24
      # 你可以关注 actions/checkout 是否发布了 v5，届时直接替换版本号效果更佳
      uses: actions/checkout@v4
      
    - name: Download and modify module
      run: |
        # 下载最新的模块文件
        curl -L -o iRingo.LocationService.sgmodule "https://github.com/NSRingo/LocationService/releases/latest/download/iRingo.LocationService.sgmodule"
        
        # 替换 GeoCountryCode 为目标区域
        sed -i 's/GeoCountryCode:"US"/GeoCountryCode:"HK"/g' iRingo.LocationService.sgmodule
        
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add iRingo.LocationService.sgmodule
        
        # 检查是否有变化，有变化才提交
        if git diff --staged --quiet; then
          echo "No changes detected"
        else
          git commit -m "chore: auto update iRingo.LocationService.sgmodule [$(date +'%Y-%m-%d %H:%M')]"
          git push
        fi
