name: Auto Update LocationService

on:
  schedule:
    # 每 24 小时运行一次
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-module:
    runs-on: ubuntu-latest
    
    # 注意：升级到 v5 后，FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 变量可以移除
    # 除非你还在使用其他尚未更新的老旧第三方 Action
    
    steps:
    - name: Checkout repository
      # 将 v4 升级为 v5，直接从底层解决 Node 版本不匹配问题
      uses: actions/checkout@v5
      
    - name: Download and modify module
      run: |
        # 下载最新的模块文件
        curl -L -o iRingo.LocationService.sgmodule "https://github.com/NSRingo/LocationService/releases/latest/download/iRingo.LocationService.sgmodule"
        
        # 替换 GeoCountryCode
        sed -i 's/GeoCountryCode:"US"/GeoCountryCode:"HK"/g' iRingo.LocationService.sgmodule
        
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add iRingo.LocationService.sgmodule
        
        if git diff --staged --quiet; then
          echo "No changes detected"
        else
          git commit -m "chore: auto update iRingo.LocationService.sgmodule [$(date +'%Y-%m-%d %H:%M')]"
          git push
        fi
